
<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prof. Isa Ali Pantami | Executive Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; transition: background 0.5s, color 0.5s; }
        
        /* Dark Theme Styles */
        .dark-theme { background: #05070a; color: #ffffff; }
        .dark-theme .stat-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark-theme .secondary-text { color: rgba(255, 255, 255, 0.6); }

        /* Light Theme Styles */
        .light-theme { background: #ffffff; color: #0f172a; }
        .light-theme .stat-card { background: #f1f5f9; border: 1px solid #e2e8f0; }
        .light-theme .secondary-text { color: #475569; }
        .light-theme h1, .light-theme h2, .light-theme p { color: #0f172a; }

        .hero-glow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 500px; background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%); z-index: -1; }
        .premium-btn { background: linear-gradient(135deg, #059669 0%, #10b981 100%); border-radius: 12px; transition: 0.3s; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); color: white !important; }
        .gov-pill { border: 1.5px solid #10b981; color: #10b981; background: rgba(16, 185, 129, 0.05); padding: 8px 24px; border-radius: 50px; font-weight: 800; letter-spacing: 2px; }
        .profile-border { border: 4px solid transparent; background: linear-gradient(white, white) padding-box, linear-gradient(45deg, #10b981, #f59e0b) border-box; }
        .dark-theme .profile-border { background: linear-gradient(#05070a, #05070a) padding-box, linear-gradient(45deg, #10b981, #f59e0b) border-box; }
    </style>
</head>
<body class="dark-theme" id="theme-body">

    <div class="hero-glow"></div>

    <nav class="sticky top-0 z-50 px-6 py-4 backdrop-blur-md border-b border-white/10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://unavatar.io/twitter/ProfIsaPantami" class="w-10 h-10 rounded-full border-2 border-[#10b981]" alt="Logo">
                <span class="font-bold text-sm tracking-widest uppercase">Prof. Pantami</span>
            </div>
            <button onclick="toggleTheme()" class="w-12 h-12 rounded-2xl border border-gray-500/30 flex items-center justify-center hover:scale-110 transition active:scale-95" id="theme-btn">
                <i class="fas fa-moon text-xl" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <header class="pt-16 pb-10 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <div class="inline-block gov-pill mb-10 text-[10px] md:text-xs">
                THE GOMBE STATE GOVERNOR 2027 INSHAA'ALLAH
            </div>

            <div class="relative w-48 h-48 md:w-60 md:h-60 mx-auto mb-10">
                <img src="https://unavatar.io/twitter/ProfIsaPantami" alt="Professor" class="w-full h-full rounded-full object-cover profile-border shadow-2xl">
            </div>

            <h1 class="text-4xl md:text-7xl font-black mb-6 tracking-tighter">
                Prof. Isa Ali <span class="text-[#10b981]">Ibrahim</span>
            </h1>
            
            <p class="text-lg md:text-2xl font-medium opacity-80 mb-12 max-w-2xl mx-auto leading-relaxed">
                Cybersecurity Professor, Pioneer Minister of <span class="text-[#10b981] font-bold">Digital Economy</span>, and Distinguished Scholar.
            </p>

            <div class="flex flex-wrap justify-center gap-6">
                <a href="https://t.me/SheikhIsaPantami" class="premium-btn px-10 py-4 font-bold flex items-center gap-3">
                    <i class="fab fa-telegram-plane"></i> JOIN COMMUNITY
                </a>
                <a href="https://x.com/ProfIsaPantami" class="border-2 border-gray-500/50 px-10 py-4 rounded-xl font-bold hover:bg-gray-500/10 transition">
                    FOLLOW ON X
                </a>
            </div>
        </div>
    </header>

    <section class="max-w-6xl mx-auto px-6 py-16">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="stat-card p-10 rounded-[32px] text-center transition">
                <p class="text-5xl font-black text-[#10b981] mb-3">1M+</p>
                <p class="text-xs uppercase tracking-[0.2em] secondary-text font-bold">Global Followers</p>
            </div>
            <div class="stat-card p-10 rounded-[32px] text-center transition border-[#10b981]/30">
                <p class="text-5xl font-black mb-3">CON</p>
                <p class="text-xs uppercase tracking-[0.2em] secondary-text font-bold">National Honor</p>
            </div>
            <div class="stat-card p-10 rounded-[32px] text-center transition">
                <p class="text-5xl font-black text-yellow-500 mb-3">PhD</p>
                <p class="text-xs uppercase tracking-[0.2em] secondary-text font-bold">United Kingdom</p>
            </div>
        </div>
    </section>

    <footer class="py-16 text-center opacity-40">
        <p class="text-[10px] tracking-[0.8em] uppercase">Excellence in Service • Gombe 2027</p>
    </footer>

    <script>
        function toggleTheme() {
            const body = document.getElementById('theme-body');
            const icon = document.getElementById('theme-icon');
            
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.style.color = '#f59e0b';
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.style.color = 'inherit';
            }
        }
    </script>
</body>
</html>
